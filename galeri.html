<style>

body{
    font-family:Poppins,sans-serif;
    background:#f5f7fb;
}

.gallery-page{

    padding:140px 8% 80px;

}

.gallery-page h1{

    text-align:center;

    color:#0d47a1;

    font-size:45px;

}

.gallery-page p{

    text-align:center;

    margin:20px 0 50px;

    color:#666;

}

.gallery-grid{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));

    gap:30px;

}

.gallery-item{

    background:white;

    border-radius:15px;

    overflow:hidden;

    box-shadow:0 10px 30px rgba(0,0,0,.15);

    transition:.3s;

}

.gallery-item:hover{

    transform:translateY(-8px);

}

.gallery-item img{

    width:100%;

    height:250px;

    object-fit:cover;

    cursor:pointer;

    transition:.3s;

}

.gallery-item img:hover{

    transform:scale(1.05);

}

.gallery-item h3{

    padding:20px;

    text-align:center;

    color:#0d47a1;

}

.back{

    display:block;

    width:220px;

    margin:60px auto 0;

    text-align:center;

    background:#0d47a1;

    color:white;

    text-decoration:none;

    padding:15px;

    border-radius:50px;

    font-weight:bold;

}

.back:hover{

    background:#08306b;

}

</style>
